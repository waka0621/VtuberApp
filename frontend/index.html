<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>webアプリ</title>
</head>
<body>
  <div>
    <button id="showJson">JSON 表示</button>
  </div>
  <pre id="tableJson" style="white-space: pre-wrap; background:#f6f6f6; padding:8px;">読み込み待ち...</pre>

  <form id="vtuberForm">
    <input id="vtuberName" type="text" placeholder="name (必須)" required>
    
    <select id="vtuberGender" required>
      <option value="" disabled selected>性別を選択 (必須)</option>
      <option value="女">女</option>
      <option value="男">男</option>
      <option value="その他">その他</option>
      <option value="定義不能">定義不能</option>
    </select>

    <input id="vtuberGroupName" type="text" placeholder="group_name (任意)">
    <input id="vtuberBirthday" type="date" placeholder="birthday (任意)">
    <input id="vtuberColorCode" type="text" placeholder="color_code (任意) 例:#FF0000">
    <textarea id="vtuberNotes" placeholder="notes (任意)"></textarea>

    <button type="submit">追加</button>
  </form>

  <div class="delete-area">
    <input id="deleteVtuberId" type="number" placeholder="削除する vtuber_id を入力" />
    <button id="deleteButton" type="button">削除</button>
  </div>

  <div class="link-area" style="margin-top:24px; border-top:1px solid #ddd; padding-top:16px;">
    <h3>SNSリンク</h3>
    <input id="linkVtuberId" type="number" placeholder="vtuber_id (必須)" />
    <input id="linkSiteName" type="text" placeholder="site_name (例: Twitter, YouTube)" />
    <input id="linkUrl" type="url" placeholder="url (任意)" />
    <textarea id="linkNotes" placeholder="notes (任意)"></textarea>
    <div style="margin-top:8px;">
      <button id="addLinkButton" type="button">リンク登録</button>
      <button id="showLinks" type="button">リンク一覧表示</button>
    </div>
    <pre id="linksJson" style="white-space: pre-wrap; background:#f6f6f6; padding:8px; margin-top:12px;">リンク一覧を表示</pre>
  </div>

  <script src="app.js"></script>
</body>
</html>
